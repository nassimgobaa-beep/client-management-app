<app-navbar></app-navbar>

<div class="clients-container">
  <header class="header">
    <h1>Gestion des Fournisseurs</h1>
  </header>

  <div class="content">
    <div class="toolbar">
      <button (click)="openCreate()" class="btn-add">+ Ajouter un fournisseur</button>
    </div>

    <div *ngIf="error" class="error-message">{{ error }}</div>

    <table class="clients-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nom</th>
          <th>Contact</th>
          <th>Email</th>
          <th>Téléphone</th>
          <th>Adresse</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of suppliers">
          <td>{{ s.id }}</td>
          <td>{{ s.name }}</td>
          <td>{{ s.contactPerson }}</td>
          <td>{{ s.email }}</td>
          <td>{{ s.phone }}</td>
          <td class="desc">{{ s.address }}</td>
          <td class="desc">{{ s.notes }}</td>
          <td class="actions">
            <button (click)="openEdit(s)" class="btn-edit">Modifier</button>
            <button (click)="delete(s.id)" class="btn-delete">Supprimer</button>
          </td>
        </tr>
        <tr *ngIf="suppliers.length === 0">
          <td colspan="8" class="no-data">Aucun fournisseur trouvé</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="modal-overlay" (click)="close()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <h2>{{ isEditing ? 'Modifier le fournisseur' : 'Ajouter un fournisseur' }}</h2>
      <form (ngSubmit)="save()" #f="ngForm">
        <div class="form-group">
          <label>Nom *</label>
          <input name="name" [(ngModel)]="currentSupplier.name" required class="form-control" />
        </div>
        <div class="form-group">
          <label>Personne de contact</label>
          <input name="contactPerson" [(ngModel)]="currentSupplier.contactPerson" class="form-control" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input name="email" type="email" [(ngModel)]="currentSupplier.email" class="form-control" />
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input name="phone" [(ngModel)]="currentSupplier.phone" class="form-control" />
        </div>
        <div class="form-group">
          <label>Adresse</label>
          <input name="address" [(ngModel)]="currentSupplier.address" class="form-control" />
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea name="notes" [(ngModel)]="currentSupplier.notes" class="form-control" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" (click)="close()" class="btn-cancel">Annuler</button>
          <button type="submit" [disabled]="!f.form.valid" class="btn-save">{{ isEditing ? 'Modifier' : 'Ajouter' }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
